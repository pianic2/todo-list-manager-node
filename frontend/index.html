<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Todo List</title>
    <link rel="stylesheet" href="./css/core.min.css" />
    <link rel="stylesheet" href="./css/project-theme.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" href="./favicon.ico" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-topbar">
        <div class="app-topbar__start">
          <button
            id="menu-toggle"
            class="app-menu-button"
            type="button"
            aria-label="Apri menu liste"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div>
            <p class="app-eyebrow">Workspace note</p>
            <h1 class="app-title">Node Todo List</h1>
          </div>
        </div>
      </header>

      <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

      <div class="app-layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar__header">
            <div>
              <p class="app-eyebrow">Navigazione</p>
              <h2 class="sidebar__title">Liste note</h2>
            </div>

            <button
              id="close-sidebar"
              class="sidebar__close"
              type="button"
              aria-label="Chiudi menu"
            >
              ×
            </button>
          </div>

          <div class="sidebar__actions">
            <button
              id="overview-button"
              class="button button--secondary button--sm u-w-full"
              type="button"
            >
              Tutte le liste
            </button>
            <button
              id="new-list-button"
              class="button button--primary button--sm u-w-full"
              type="button"
            >
              Nuova lista
            </button>
          </div>

          <form id="list-form" class="create-list-form form" hidden>
            <label class="u-visually-hidden" for="list-input">List name</label>
            <input
              id="list-input"
              class="form__control"
              name="title"
              type="text"
              placeholder="Nome lista"
              autocomplete="off"
            />
          </form>

          <nav aria-label="Liste note">
            <ul id="lists-container" class="lists-nav" aria-label="Todo lists"></ul>
          </nav>
        </aside>

        <main class="main-content notes-page" id="main-content">
          <header class="main-header">
            <div class="main-header__copy">
              <p class="app-eyebrow" id="main-header-eyebrow">Organizzazione</p>
              <h2 id="items-list-title">Tutte le liste</h2>
              <p id="items-list-description" class="u-text-muted">
                Ogni lista organizza le note. Una nota nasce sempre dentro una lista.
              </p>
            </div>

            <div class="main-header__actions" id="main-header-actions" hidden>
              <button id="edit-list-button" class="button button--outline" type="button">
                Modifica lista
              </button>
              <button id="new-item-button" class="button button--primary" type="button">
                Nuova nota
              </button>
            </div>
          </header>

          <section id="empty-state" class="empty-state" aria-live="polite">
            <div class="empty-state__content">
              <h3>Nessuna lista selezionata</h3>
              <p>Scegli una lista o creane una nuova per iniziare.</p>
            </div>
          </section>

          <section id="items-container" class="items-panel" hidden aria-labelledby="items-list-title">
            <form id="item-form" class="form form--inline item-create-form" hidden>
              <div class="form__group">
                <label class="u-visually-hidden" for="item-input">New item</label>
                <input
                  id="item-input"
                  class="form__control"
                  name="text"
                  type="text"
                  placeholder="Aggiungi una nota..."
                  autocomplete="off"
                />
              </div>
            </form>

            <nav class="task-filters" aria-label="Filtra note">
              <button class="button button--sm button--primary" type="button" data-filter="all">
                Tutte
              </button>
              <button class="button button--sm button--outline" type="button" data-filter="todo">
                Da fare
              </button>
              <button class="button button--sm button--outline" type="button" data-filter="done">
                Completate
              </button>
            </nav>

            <ul id="items" class="items-list" aria-label="Todo items"></ul>
          </section>

          <section id="lists-overview" class="lists-overview" hidden aria-labelledby="items-list-title">
            <ul id="list-cards" class="list-cards" aria-label="Tutte le liste"></ul>
          </section>
        </main>
      </div>
    </div>

    <script src="api.js"></script>
    <script src="main.js"></script>
  </body>
</html>
