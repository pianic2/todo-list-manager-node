services:
  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run db:init && node src/server.js"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/production.sqlite
      CORS_ORIGIN: http://localhost:3100,http://127.0.0.1:3100
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    volumes:
      - .:/app
      - backend-node-modules:/app/node_modules
      - todo-data:/app/data

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: node scripts/serve-frontend.js
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 3100
    ports:
      - "3100:3100"
    volumes:
      - .:/app:ro
    depends_on:
      - backend

volumes:
  backend-node-modules:
  todo-data:
