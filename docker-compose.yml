services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/production.sqlite
      CORS_ORIGIN: http://localhost:3100
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
    volumes:
      - todo-data:/app/data

volumes:
  todo-data:
